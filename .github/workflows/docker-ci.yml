name: Build and Push Docker Images

# 1. When should this run?
on:
  push:
    branches:
      - main  # Wakes up automatically when you push to the main branch

# 2. What should it do?
jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub gives you a free, temporary Linux machine

    steps:
      # Step A: Download your code into the temporary machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Log into Docker Hub using the secrets you just saved!
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step C: Build and push the Node.js Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend      # Looks for the Dockerfile in your backend folder
          push: true
          tags: saikiran1412/backend:latest

      # Step D: Build and push the Vite Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend     # Looks for the Dockerfile in your frontend folder
          push: true
          tags: saikiran1412/frontend:latest