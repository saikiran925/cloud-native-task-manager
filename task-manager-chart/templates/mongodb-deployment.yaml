apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: {{ .Values.mongodb.replicaCount }}
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          # image: mongo:latest
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag}}"
          ports:
            - containerPort: 27017